worker_processes auto;
worker_rlimit_nofile 65535;
events {
    worker_connections 16384;
    multi_accept on;
    use epoll;
}
http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 10000;
    reset_timedout_connection on;
    client_body_timeout 30;
    send_timeout 10;
    server_tokens off;

    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=decoy_cache:10m max_size=100m inactive=60m;
    proxy_cache_key "$scheme$request_method$host$request_uri";

    proxy_buffering off;
    proxy_request_buffering off;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    server {
        listen 8080;
        server_name _;

        location /health {
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        location / {
            proxy_cache decoy_cache;
            proxy_cache_valid 200 302 10m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating;

            proxy_pass https://DECOY_IP;
            proxy_set_header Host "CLEAN_DECOY";
            proxy_ssl_server_name on;
            proxy_ssl_session_reuse on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            proxy_ssl_ciphers HIGH:!aNULL:!MD5;

            proxy_hide_header Content-Security-Policy;
            add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: *; frame-src 'self' https://www.youtube.com https://*.youtube.com; frame-ancestors 'self';" always;

            sub_filter_once off;
            sub_filter_types text/html;
            sub_filter '</head>' '<script>
                window.addEventListener("load", function() {
                    const cleanAds = function() {
                        const skipBtn = document.querySelector(".ytp-ad-skip-button");
                        if (skipBtn) skipBtn.click();
                        const overlay = document.querySelector(".ytp-ad-overlay-container");
                        if (overlay) overlay.remove();
                        const panel = document.querySelector(".ytp-ad-info-dialog-container");
                        if (panel) panel.remove();
                        document.querySelectorAll(".ytd-display-ad-renderer, ytd-compact-promoted-video-renderer, ytd-promoted-sparkles-web-renderer, #masthead-ad").forEach(el => el.remove());
                        document.querySelectorAll("iframe").forEach(frame => {
                            if (frame.src.includes("doubleclick") || frame.src.includes("ad.")) frame.remove();
                        });
                    };
                    cleanAds();
                    new MutationObserver(cleanAds).observe(document.body, { childList: true, subtree: true });
                });
            </script></head>';

            sub_filter 'pagead2.googlesyndication.com' 'blocked.local';
