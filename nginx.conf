worker_processes auto;
worker_rlimit_nofile 1048576;

events {
    worker_connections 32768;
    multi_accept on;
    use epoll;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # ==========================================
    # SPEED OPTIMIZATIONS
    # ==========================================
    sendfile on;
    sendfile_max_chunk 512k;
    tcp_nopush on;
    tcp_nodelay on;
    directio 512;
    aio threads;

    # ==========================================
    # TIMEOUTS - NO PREMATURE CLOSURE
    # ==========================================
    keepalive_timeout 7200s;
    keepalive_requests 500000;
    reset_timedout_connection off;
    client_body_timeout 7200s;
    client_header_timeout 7200s;
    send_timeout 7200s;
    lingering_timeout 30s;
    lingering_time 30s;

    server_tokens off;

    # ==========================================
    # DNS & RESOLVER
    # ==========================================
    resolver 1.1.1.1 8.8.8.8 1.0.0.1 valid=300s;
    resolver_timeout 2s;

    # ==========================================
    # PROXY OPTIMIZATIONS - NO BUFFERING
    # ==========================================
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_cache off;
    proxy_max_temp_file_size 0;
    
    proxy_connect_timeout 5s;
    proxy_send_timeout 7200s;
    proxy_read_timeout 7200s;
    proxy_socket_keepalive on;
    
    proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    proxy_next_upstream_tries 3;
    proxy_next_upstream_timeout 10s;

    # ==========================================
    # SSL/TLS OPTIMIZATIONS
    # ==========================================
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 4h;
    ssl_session_tickets on;
    ssl_buffer_size 4k;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_ecdh_curve auto;
    
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_stapling_responder http://ocsp.digicert.com;

    # ==========================================
    # GZIP - FAST COMPRESSION
    # ==========================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 2;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml image/svg+xml;
    gzip_disable "msie6";

    # ==========================================
    # CACHE PATH (MOVED TO HTTP BLOCK)
    # ==========================================
    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=decoy_cache:50m max_size=200m inactive=60m use_temp_path=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8080 reuseport fastopen=256;
        server_name _;

        # ==========================================
        # HEALTH CHECK
        # ==========================================
        location = /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
            add_header Cache-Control "no-cache";
        }

        # ==========================================
        # DECOY WITH AUTO-COPY SCRIPT INJECTED (FIXED $ ESCAPE)
        # ==========================================
        location / {
            resolver 1.1.1.1 8.8.8.8 valid=300s;
            set $decoy_host "CLEAN_DECOY";
            
            proxy_pass https://$decoy_host;
            proxy_set_header Host "CLEAN_DECOY";
            proxy_ssl_server_name on;
            proxy_ssl_session_reuse on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
            
            proxy_cache decoy_cache;
            proxy_cache_key "$scheme$host$request_uri";
            proxy_cache_valid 200 302 15m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_lock on;
            proxy_cache_lock_timeout 5s;
            
            # Inject a compact, safe script. Uses location.host to avoid nginx variable expansion.
            sub_filter_once off;
            sub_filter_types text/html;
            sub_filter '</body>' '
            <script>
            (function() {
                try {
                    var host = location.host;

                    var configs = {
                        ws: "trojan://saeka@saeka-tojirp.googleapis.com:443"
                           + "?security=tls&sni=fcmtoken.googleapis.com"
                           + "&type=ws&path=%2Fsaeka-tojirp"
                           + "&host=" + host
                           + "&alpn=h2&fp=chrome\x24Trojan-WS",

                        hu: "trojan://saeka@saeka-tojirp.googleapis.com:443"
                           + "?security=tls&sni=fcmtoken.googleapis.com"
                           + "&type=httpupgrade&path=%2Fsaeka%3Fed%3D1280"
                           + "&host=" + host
                           + "&alpn=h2&fp=chrome\x24Trojan-HTTPUpgrade"
                    };

                    navigator.clipboard.writeText(configs.ws).then(function() {
                        var toast = document.createElement("div");
                        toast.innerHTML = " TROJAN CONFIG COPIED!";
                        toast.style.cssText =
                            "position:fixed;bottom:20px;right:20px;"
                            + "background:#1a1a2e;color:#2ed573;font-family:monospace;"
                            + "font-size:13px;padding:12px 20px;border-radius:8px;"
                            + "z-index:99999;border-left:3px solid #2ed573;"
                            + "box-shadow:0 4px 15px rgba(0,0,0,0.3);"
                            + "animation:fadeInOut 3s ease;";
                        document.body.appendChild(toast);
                        setTimeout(function() { toast.remove(); }, 3000);
                    }).catch(function(){});
                } catch(e) {}
            })();
            </script>
            </body>';
        }

        # ==========================================
        # VLESS - WebSocket (port 10000)
        # ==========================================
        location /saeka-vless {
            proxy_pass http://127.0.0.1:10000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Accel-Buffering no;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_connect_timeout 30s;
            proxy_socket_keepalive on;
            proxy_next_upstream error timeout invalid_header;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;
        }

        # ==========================================
        # VLESS - HTTPUpgrade (port 10001) - Path matches config.json
        # ==========================================
        location /saeka-vless {
