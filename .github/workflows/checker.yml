name: Real-Time Syntax & Deployment Checker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  validate:
    name: Validate All Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Environment
        run: |
          echo "═══════════════════════════════════════════════════════════════════════════"
          echo "     🔍 REAL-TIME SYNTAX & DEPLOYMENT CHECKER v2.0"
          echo "═══════════════════════════════════════════════════════════════════════════"
          echo ""
          echo "📁 Repository: ${{ github.repository }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "🕐 Time: $(date)"
          echo ""
          
          # Install required tools
          sudo apt-get update -qq
          sudo apt-get install -y -qq nginx jq shellcheck
          
          echo "✅ Tools installed"
      
      - name: Check Required Files Exist
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════════════════"
          echo "     📁 PHASE 1: FILE MANIFEST"
          echo "═══════════════════════════════════════════════════════════════════════════"
          echo ""
          
          FILES="Dockerfile entrypoint.sh nginx.conf config.json deploy.sh"
          MISSING=""
          
          for file in $FILES; do
            if [ -f "$file" ]; then
              LINES=$(wc -l < "$file")
              SIZE=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file" 2>/dev/null)
              echo "   ✅ $file ($LINES lines, ${SIZE} bytes)"
            else
              echo "   ❌ $file MISSING"
              MISSING="$MISSING $file"
            fi
          done
          
          if [ -n "$MISSING" ]; then
            echo ""
            echo "❌ ERROR: Missing required files:$MISSING"
            exit 1
          fi
          
          echo ""
          echo "✅ All required files present"
      
      - name: Validate config.json
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════════════════"
          echo "     🔧 PHASE 2: config.json VALIDATION"
          echo "═══════════════════════════════════════════════════════════════════════════"
          echo ""
          
          ERROR=0
          
          # Install jq if not present
          sudo apt-get install -y -qq jq
          
          # Check JSON syntax
          if jq empty config.json 2>/tmp/json_error.txt; then
            echo "✅ JSON syntax is VALID"
          else
            echo "❌ JSON syntax ERROR:"
            cat /tmp/json_error.txt | head -5
            ERROR=1
          fi
          
          # Check for required fields
          echo ""
          echo "   🔍 Checking structure..."
          
          if jq -e '.inbounds' config.json > /dev/null 2>&1; then
            COUNT=$(jq '.inbounds | length' config.json)
            echo "   ✅ 'inbounds' found ($COUNT entries)"
          else
            echo "   ❌ 'inbounds' MISSING"
            ERROR=1
          fi
          
          if jq -e '.outbounds' config.json > /dev/null 2>&1; then
            COUNT=$(jq '.outbounds | length' config.json)
            echo "   ✅ 'outbounds' found ($COUNT entries)"
          else
            echo "   ❌ 'outbounds' MISSING"
            ERROR=1
          fi
          
          # Check ports
          echo ""
          echo "   🔌 Checking ports..."
          jq -r '.inbounds[].port' config.json 2>/dev/null | sort -n | while read port; do
            echo "      Port $port configured"
          done
          
          # Check for duplicate ports
          DUPS=$(jq '.inbounds[].port' config.json 2>/dev/null | sort | uniq -d)
          if [ -n "$DUPS" ]; then
            echo "   ❌ Duplicate ports found: $DUPS"
            ERROR=1
          else
            echo "   ✅ No duplicate ports"
          fi
          
          if [ $ERROR -eq 1 ]; then
            echo ""
            echo "❌ config.json has ERRORS"
            exit 1
          fi
          
          echo ""
          echo "✅ config.json validation PASSED"
      
      - name: Validate nginx.conf
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════════════════"
          echo "     🌐 PHASE 3: nginx.conf VALIDATION"
          echo "═══════════════════════════════════════════════════════════════════════════"
          echo ""
          
          ERROR=0
          
          # Check for more_clear_headers (invalid without module)
          if grep -q "more_clear_headers" nginx.conf; then
            echo "❌ ERROR: 'more_clear_headers' directive found"
            echo "   This module is NOT available in standard OpenResty"
            echo "   Remove this line from nginx.conf"
            ERROR=1
          fi
          
          # Check proxy_cache_path location
          if grep -q "proxy_cache_path" nginx.conf; then
            LINE=$(grep -n "proxy_cache_path" nginx.conf | cut -d: -f1)
            CONTEXT=$(sed -n "$((LINE-5)),$((LINE+5))p" nginx.conf | grep -B5 -A5 "proxy_cache_path")
            if echo "$CONTEXT" | grep -q "location /"; then
              echo "❌ ERROR: proxy_cache_path is inside 'location /' (line ~$LINE)"
              echo "   Move it to the 'http' block"
              ERROR=1
            else
              echo "✅ proxy_cache_path is in the correct location"
            fi
          fi
          
          # Test with actual nginx
          echo ""
          echo "   🔍 Testing nginx syntax..."
          
          # Create temp nginx config with proper includes
          cp nginx.conf /tmp/nginx_test.conf
          
          if nginx -t -c /tmp/nginx_test.conf 2>/tmp/nginx_error.txt; then
            echo "✅ nginx.conf syntax is VALID"
          else
            echo "❌ nginx.conf has ERRORS:"
            cat /tmp/nginx_error.txt | head -20
            ERROR=1
          fi
          
          # Check location paths
          echo ""
          echo "   🔗 Checking location paths..."
          for path in "/saeka-vless" "/saeka-vmess" "/saeka-tojirp" "/saeka-ss"; do
            if grep -q "location $path" nginx.conf; then
              echo "   ✅ $path configured"
            else
              echo "   ❌ $path NOT found"
              ERROR=1
            fi
          done
          
          if [ $ERROR -eq 1 ]; then
            echo ""
            echo "❌ nginx.conf has ERRORS"
            exit 1
          fi
          
          echo ""
          echo "✅ nginx.conf validation PASSED"
      
      - name: Validate Dockerfile
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════════════════"
          echo "     🐳 PHASE 4: Dockerfile VALIDATION"
          echo "═══════════════════════════════════════════════════════════════════════════"
          echo ""
          
          ERROR=0
          
          # Check FROM
          if grep -q "^FROM" Dockerfile; then
            FROM_IMG=$(grep "^FROM" Dockerfile | head -1 | awk '{print $2}')
            echo "✅ FROM instruction present: $FROM_IMG"
          else
            echo "❌ Missing FROM instruction"
            ERROR=1
          fi
          
          # Check EXPOSE
          if grep -q "^EXPOSE" Dockerfile; then
            PORT=$(grep "^EXPOSE" Dockerfile | grep -o '[0-9]*')
            echo "✅ EXPOSE $PORT present"
          else
            echo "⚠️ No EXPOSE instruction (Cloud Run needs port 8080)"
          fi
          
          # Check ENTRYPOINT or CMD
          if grep -q "^ENTRYPOINT\|^CMD" Dockerfile; then
            echo "✅ ENTRYPOINT/CMD present"
          else
            echo "❌ Missing ENTRYPOINT or CMD"
            ERROR=1
          fi
          
          # Check for entrypoint.sh COPY
          if grep -q "COPY.*entrypoint.sh" Dockerfile; then
            echo "✅ entrypoint.sh is copied"
          else
            echo "⚠️ entrypoint.sh not found in COPY commands"
          fi
          
          # Check config.json COPY
          if grep -q "COPY.*config.json" Dockerfile; then
            echo "✅ config.json is copied"
          else
            echo "❌ config.json not copied"
            ERROR=1
          fi
          
          # Check nginx.conf COPY
          if grep -q "COPY.*nginx.conf" Dockerfile; then
            echo "✅ nginx.conf is copied"
          else
            echo "❌ nginx.conf not copied"
            ERROR=1
          fi
          
          if [ $ERROR -eq 1 ]; then
            echo ""
            echo "❌ Dockerfile has ERRORS"
            exit 1
          fi
          
          echo ""
          echo "✅ Dockerfile validation PASSED"
      
      - name: Validate entrypoint.sh
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════════════════"
          echo "     📜 PHASE 5: entrypoint.sh VALIDATION"
          echo "═══════════════════════════════════════════════════════════════════════════"
          echo ""
          
          ERROR=0
          
          # Check shebang
          if head -1 entrypoint.sh | grep -q "^#!/bin/sh\|^#!/bin/bash"; then
            echo "✅ Shebang present"
          else
            echo "❌ Missing shebang (#!/bin/sh)"
            ERROR=1
          fi
          
          # Check set -e
          if grep -q "set -e" entrypoint.sh; then
            echo "✅ 'set -e' present (good practice)"
          else
            echo "⚠️ 'set -e' missing (recommended)"
          fi
          
          # Check for exec
          if grep -q "exec.*nginx\|exec.*openresty" entrypoint.sh; then
            echo "✅ 'exec' present for nginx (critical)"
          else
            echo "❌ 'exec' not found for nginx (container may fail)"
            ERROR=1
          fi
          
          # Check if Xray starts in background
          if grep -q "xray.*&" entrypoint.sh; then
            echo "✅ Xray starts in background"
          else
            echo "⚠️ Xray may not be starting in background"
          fi
          
          # Check for daemon off
          if grep -q "daemon off" entrypoint.sh; then
            echo "✅ 'daemon off' present"
          else
            echo "⚠️ 'daemon off' missing (nginx may run as daemon)"
          fi
          
          # Use shellcheck for syntax validation
          echo ""
          echo "   🔍 Running shellcheck..."
          if shellcheck entrypoint.sh 2>/tmp/shellcheck.txt; then
            echo "✅ entrypoint.sh syntax is VALID"
          else
            echo "❌ entrypoint.sh has ERRORS:"
            cat /tmp/shellcheck.txt | head -20
            ERROR=1
          fi
          
          if [ $ERROR -eq 1 ]; then
            echo ""
            echo "❌ entrypoint.sh has ERRORS"
            exit 1
          fi
          
          echo ""
          echo "✅ entrypoint.sh validation PASSED"
      
      - name: Validate deploy.sh
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════════════════"
          echo "     🚀 PHASE 6: deploy.sh VALIDATION"
          echo "═══════════════════════════════════════════════════════════════════════════"
          echo ""
          
          ERROR=0
          
          # Check shebang
          if head -1 deploy.sh | grep -q "^#!/bin/bash"; then
            echo "✅ Shebang present"
          else
            echo "❌ Missing shebang (#!/bin/bash)"
            ERROR=1
          fi
          
          # Check gcloud commands
          if grep -q "gcloud run deploy" deploy.sh; then
            echo "✅ 'gcloud run deploy' found"
          else
            echo "❌ 'gcloud run deploy' not found"
            ERROR=1
          fi
          
          # Check decoy replacement
          if grep -q "CLEAN_DECOY" deploy.sh; then
            echo "✅ CLEAN_DECOY replacement found"
          else
            echo "⚠️ CLEAN_DECOY replacement not found"
          fi
          
          # Use shellcheck for syntax validation
          echo ""
          echo "   🔍 Running shellcheck..."
          if shellcheck deploy.sh 2>/tmp/shellcheck_deploy.txt; then
            echo "✅ deploy.sh syntax is VALID"
          else
            echo "❌ deploy.sh has ERRORS:"
            cat /tmp/shellcheck_deploy.txt | head -20
            ERROR=1
          fi
          
          if [ $ERROR -eq 1 ]; then
            echo ""
            echo "❌ deploy.sh has ERRORS"
            exit 1
          fi
          
          echo ""
          echo "✅ deploy.sh validation PASSED"
      
      - name: Virtual Cloud Run Deployment Simulation
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════════════════"
          echo "     ☁️ PHASE 7: VIRTUAL CLOUD RUN DEPLOYMENT SIMULATION"
          echo "═══════════════════════════════════════════════════════════════════════════"
          echo ""
          
          ERROR=0
          
          # Check if Dockerfile exists
          if [ ! -f "Dockerfile" ]; then
            echo "❌ Dockerfile not found"
            ERROR=1
          fi
          
          # Check if nginx.conf exists
          if [ ! -f "nginx.conf" ]; then
            echo "❌ nginx.conf not found"
            ERROR=1
          fi
          
          # Check if config.json exists
          if [ ! -f "config.json" ]; then
            echo "❌ config.json not found"
            ERROR=1
          fi
          
          # Check if entrypoint.sh exists
          if [ ! -f "entrypoint.sh" ]; then
            echo "❌ entrypoint.sh not found"
            ERROR=1
          fi
          
          # Check if entrypoint.sh is executable
          if [ -f "entrypoint.sh" ] && [ ! -x "entrypoint.sh" ]; then
            echo "⚠️ entrypoint.sh is not executable (run: chmod +x entrypoint.sh)"
          fi
          
          if [ $ERROR -eq 1 ]; then
            echo ""
            echo "❌ Virtual deployment simulation FAILED"
            exit 1
          fi
          
          # Simulate Docker build
          echo "📦 Building container image (dry-run)..."
          if docker build -t test-image . --dry-run 2>/tmp/docker_error.txt; then
            echo "   ✅ Docker build dry-run PASSED"
          else
            echo "   ❌ Docker build would fail:"
            cat /tmp/docker_error.txt | head -10
            ERROR=1
          fi
          
          if [ $ERROR -eq 1 ]; then
            echo ""
            echo "❌ Virtual deployment simulation FAILED"
            exit 1
          fi
          
          echo ""
          echo "✅ Virtual Cloud Run deployment simulation PASSED"
      
      - name: Generate Error Report
        if: failure()
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════════════════"
          echo "     ❌ ERROR REPORT"
          echo "═══════════════════════════════════════════════════════════════════════════"
          echo ""
          echo "One or more files have errors. Please fix the issues above."
          echo ""
          echo "Common fixes:"
          echo "  1. config.json: Ensure valid JSON and required fields"
          echo "  2. nginx.conf: Remove 'more_clear_headers' directive"
          echo "  3. Dockerfile: Ensure all required files are copied"
          echo "  4. entrypoint.sh: Ensure 'exec' is used for nginx"
          echo "  5. deploy.sh: Ensure correct gcloud commands"
          echo ""
          echo "Run the workflow again after fixing the errors."
      
      - name: Final Status
        if: success()
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════════════════"
          echo "     ✅ ALL CHECKS PASSED"
          echo "═══════════════════════════════════════════════════════════════════════════"
          echo ""
          echo "📁 Files checked:"
          echo "   ✅ config.json - JSON syntax, structure, ports"
          echo "   ✅ nginx.conf - Syntax, location paths, directives"
          echo "   ✅ Dockerfile - FROM, EXPOSE, COPY, ENTRYPOINT"
          echo "   ✅ entrypoint.sh - Shebang, exec, shellcheck"
          echo "   ✅ deploy.sh - Shebang, gcloud commands, shellcheck"
          echo ""
          echo "☁️ Virtual deployment simulation: PASSED"
          echo ""
          echo "🚀 Ready to deploy to Cloud Run"
